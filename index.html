<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Big Pitcher of Water — APA Stats v16</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy:      #0c2340;
  --navy-mid:  #1a3660;
  --navy-lt:   #234880;
  --red:       #c0152a;
  --white:     #ffffff;
  --page-bg:   #eef0f3;
  --card-bg:   #ffffff;
  --border:    #d4d8de;
  --border-lt: #eaecef;
  --text:      #1a1f2e;
  --text-mid:  #3d4452;
  --muted:     #6b7480;
  --row-alt:   #f7f9fb;
  --win:       #1a7a3c;
  --win-bg:    #e8f5ee;
  --loss:      #b01220;
  --gold:      #c8960a;
  --green-patch: #1a7a3c;
}
body { font-family: 'Open Sans', system-ui, sans-serif; background: var(--page-bg); color: var(--text); min-height: 100vh; font-size: 14px; }

/* Header */
.site-header { background: var(--navy); border-bottom: 4px solid var(--red); padding: 0 28px; display: flex; align-items: center; justify-content: space-between; height: 64px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.35); }

.brand-wrap { display: flex; align-items: center; gap: 14px; }
.brand-main { font-family: 'Oswald', sans-serif; font-size: 1.25rem; font-weight: 700; color: #fff; letter-spacing: 1.5px; text-transform: uppercase; line-height: 1.1; }
.brand-sub  { font-size: .68rem; color: #8aaacf; letter-spacing: 2px; text-transform: uppercase; }
.status-pill { display: flex; align-items: center; gap: 6px; font-size: .75rem; color: #8aaacf; }
.sdot { width: 7px; height: 7px; border-radius: 50%; background: #8aaacf; }
.sdot.ok  { background: #3dd68c; box-shadow: 0 0 5px #3dd68c80; }
.sdot.err { background: #e05252; }

/* Tabs */
.tab-bar { background: var(--navy-mid); display: flex; padding: 0 28px; gap: 2px; overflow-x: auto; position: sticky; top: 64px; z-index: 90; box-shadow: 0 2px 6px rgba(0,0,0,.25); }
.tab { font-family: 'Oswald', sans-serif; font-size: .88rem; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; padding: 12px 20px; cursor: pointer; color: #7a9dc0; border-bottom: 3px solid transparent; margin-bottom: -1px; transition: color .15s, border-color .15s; white-space: nowrap; user-select: none; }
.tab:hover { color: #c8dced; }
.tab.active { color: #fff; border-bottom-color: var(--red); }

/* Content */
.content { max-width: 1100px; margin: 0 auto; padding: 28px 20px 60px; }

/* Cards */
.card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; margin-bottom: 24px; box-shadow: 0 1px 3px rgba(0,0,0,.07); }
.card-head { background: var(--navy); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; }
.card-title { font-family: 'Oswald', sans-serif; font-size: .88rem; font-weight: 600; color: #fff; letter-spacing: 2px; text-transform: uppercase; }
.card-sub   { font-size: .72rem; color: #7a9dc0; }

/* Tables */
.tbl-wrap { overflow-x: auto; }
.stbl { width: 100%; border-collapse: collapse; }
.stbl thead th {
  padding: 10px 14px; text-align: left; font-family: 'Oswald', sans-serif; font-size: .7rem; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); background: #f0f3f7; border-bottom: 2px solid var(--border); white-space: nowrap; cursor: pointer; user-select: none; transition: background .12s; position: relative;
}
.stbl thead th:hover { background: #e4e8ef; color: var(--navy); }
.stbl thead th.sort-asc::after  { content: ' ▲'; font-size: .6rem; color: var(--red); }
.stbl thead th.sort-desc::after { content: ' ▼'; font-size: .6rem; color: var(--red); }
.stbl thead th.no-sort { cursor: default; }
.stbl thead th.no-sort:hover { background: #f0f3f7; color: var(--muted); }
.stbl tbody td { padding: 12px 14px; border-bottom: 1px solid var(--border-lt); vertical-align: middle; font-size: .87rem; }
.stbl tbody tr:last-child > td { border-bottom: none; }
.stbl tbody tr:nth-child(even) > td { background: var(--row-alt); }
.stbl tbody tr:hover > td { background: #edf2f8; }

.pname { font-family: 'Oswald', sans-serif; font-size: 1rem; font-weight: 600; color: var(--navy); }
.sl-badge { display: inline-flex; align-items: center; justify-content: center; width: 30px; height: 30px; border-radius: 50%; background: var(--navy); color: #fff; font-family: 'Oswald', sans-serif; font-size: .88rem; font-weight: 700; }
.sl-badge.empty { background: var(--border); color: var(--muted); }
.wl { font-family: 'Oswald', sans-serif; font-size: .95rem; font-weight: 600; }
.w  { color: var(--win); }
.l  { color: var(--loss); }
.stat-val { font-family: 'Oswald', sans-serif; font-size: .92rem; font-weight: 600; color: var(--text-mid); }

/* Win% bar */
.bar-wrap { display: flex; align-items: center; gap: 8px; min-width: 120px; }
.bar-track { flex: 1; height: 8px; border-radius: 4px; background: var(--border); overflow: hidden; }
.bar-fill  { height: 100%; border-radius: 4px; }
.bar-lbl   { font-family: 'Oswald', sans-serif; font-size: .88rem; font-weight: 600; min-width: 44px; text-align: right; }

/* Refresh bar */
.refresh-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.last-upd { font-size: .78rem; color: var(--muted); }
.btn-refresh { font-family: 'Oswald', sans-serif; font-size: .78rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; padding: 7px 16px; background: var(--navy); color: #fff; border: none; border-radius: 4px; cursor: pointer; }
.btn-refresh:hover { background: var(--navy-lt); }
.btn-refresh:disabled { opacity: .5; cursor: default; }

/* Summary tiles */
.tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 24px; }
.tile { background: var(--card-bg); border: 1px solid var(--border); border-top: 3px solid var(--navy); border-radius: 6px; padding: 14px 18px; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
.tile.red  { border-top-color: var(--red); }
.tile.gold { border-top-color: var(--gold); }
.tile-lbl  { font-family: 'Oswald', sans-serif; font-size: .68rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
.tile-val  { font-family: 'Oswald', sans-serif; font-size: 1.6rem; font-weight: 700; color: var(--navy); line-height: 1; }

/* PPM footnote */
.footnote { font-size: .78rem; color: var(--muted); padding: 10px 16px 12px; border-top: 1px solid var(--border-lt); font-style: italic; }

/* Advanced stats */
.adv-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(460px, 1fr)); gap: 20px; }
.adv-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.adv-card-head { background: var(--navy); padding: 10px 16px; }
.adv-card-name { font-family: 'Oswald', sans-serif; font-size: 1rem; font-weight: 700; color: #fff; letter-spacing: 1px; text-transform: uppercase; }
.adv-card-sl   { font-size: .72rem; color: #8aaacf; margin-top: 2px; }
.adv-inner { padding: 0; }
.no-data { text-align: center; padding: 36px; color: var(--muted); font-style: italic; font-size: .86rem; }
.opp-chip { display: inline-block; background: var(--navy); color: #8aaacf; font-family: 'Oswald', sans-serif; font-size: .72rem; font-weight: 600; letter-spacing: 1px; padding: 3px 10px; border-radius: 3px; }
.adv-tab-bar { display: flex; border-bottom: 1px solid var(--border); }
.adv-tab { font-family: 'Oswald', sans-serif; font-size: .72rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; padding: 9px 16px; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .12s; user-select: none; }
.adv-tab:hover { color: var(--navy); }
.adv-tab.active { color: var(--red); border-bottom-color: var(--red); }

/* Patch tracker */
.patch-section-title { font-family: 'Oswald', sans-serif; font-size: .78rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); padding: 10px 16px 6px; background: #f7f9fb; border-bottom: 1px solid var(--border-lt); }
.patch-tbl { width: 100%; border-collapse: collapse; }
.patch-tbl th { padding: 9px 12px; font-family: 'Oswald', sans-serif; font-size: .68rem; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); background: #f0f3f7; border-bottom: 2px solid var(--border); border-right: 1px solid var(--border); white-space: nowrap; text-align: center; }
.patch-tbl th:first-child { text-align: left; border-right: 2px solid var(--border); }
.patch-tbl th:last-child { border-right: none; }
.patch-tbl td { padding: 11px 12px; border-bottom: 1px solid var(--border-lt); border-right: 1px solid var(--border-lt); text-align: center; font-size: .85rem; }
.patch-tbl td:first-child { text-align: left; border-right: 2px solid var(--border); }
.patch-tbl td:last-child { border-right: none; }
.patch-tbl tbody tr:nth-child(even) td { background-color: var(--row-alt); }
.patch-tbl tbody tr:hover td { background: #edf2f8; }
.check { color: var(--green-patch); font-size: 1rem; font-weight: 700; }
.check-cnt { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 50%; background: var(--win-bg); color: var(--green-patch); font-family: 'Oswald', sans-serif; font-size: .78rem; font-weight: 700; cursor: pointer; }
.total-badge { display: inline-flex; align-items: center; justify-content: center; min-width: 28px; height: 22px; border-radius: 11px; background: var(--navy); color: #fff; font-family: 'Oswald', sans-serif; font-size: .75rem; font-weight: 700; padding: 0 6px; }
.patch-type-8  { background-image: linear-gradient(to right, #1a5fb4 4px, transparent 4px); }
.patch-type-9  { background-image: linear-gradient(to right, #c0152a 4px, transparent 4px); }
.patch-type-tm { background-image: linear-gradient(to right, #c8960a 4px, transparent 4px); }
.patch-type-sp { background-image: linear-gradient(to right, #6a3a9e 4px, transparent 4px); }
/* Even-row tint must use background-color only so it stacks under the gradient stripe */
.patch-tbl tbody tr:nth-child(even) td:first-child { background-color: var(--row-alt); }

/* Adv toggle button — styled as SL bubble */
.adv-toggle {
  display: inline-flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--navy); color: #fff;
  font-family: 'Oswald', sans-serif; font-size: .82rem; font-weight: 700;
  border: none; cursor: pointer; transition: background .15s;
  line-height: 1;
}
.adv-toggle:hover { background: var(--navy-lt); }
.adv-toggle.open  { background: var(--red); }

/* Leaderboard */
.lb-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; padding: 16px; }
.lb-card { border: 1px solid var(--border); border-radius: 6px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; background: var(--card-bg); }
.lb-rank { font-family: 'Oswald', sans-serif; font-size: 1.4rem; font-weight: 700; color: var(--border); min-width: 30px; }
.lb-rank.r1 { color: #c8960a; }
.lb-rank.r2 { color: #8a9298; }
.lb-rank.r3 { color: #b87040; }
.lb-name { font-family: 'Oswald', sans-serif; font-size: .92rem; font-weight: 600; color: var(--navy); }
.lb-count { font-size: .78rem; color: var(--muted); }
.lb-badges { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
.lb-badge { display: inline-block; width: 8px; height: 8px; border-radius: 50%; }
.lb-badge.b8  { background: #1a5fb4; }
.lb-badge.b9  { background: var(--red); }
.lb-badge.btm { background: var(--gold); }
.lb-badge.bsp { background: #6a3a9e; }

/* Patch date tooltip */
.patch-tip {
  position: fixed;
  background: var(--navy);
  color: #d4e4f4;
  border: 1px solid var(--navy-lt);
  border-radius: 6px;
  padding: 8px 12px;
  font-size: .78rem;
  line-height: 1.7;
  pointer-events: none;
  display: none;
  z-index: 500;
  white-space: pre;
  box-shadow: 0 4px 14px rgba(0,0,0,.3);
}
.patch-tip .tip-title { font-family: 'Oswald', sans-serif; font-size: .72rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: #8aaacf; margin-bottom: 4px; }
.check-cnt { cursor: pointer; }
.team-ph { text-align: center; padding: 60px 20px; color: var(--muted); }
.team-ph h2 { font-family: 'Oswald', sans-serif; font-size: 1.4rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--navy); margin-bottom: 10px; }
.team-ph p { font-size: .88rem; line-height: 1.7; max-width: 360px; margin: 0 auto; }

/* Setup banner */
.setup { background: #fff9e6; border: 1px solid #f0c040; border-left: 5px solid #f0c040; border-radius: 6px; padding: 20px 24px; margin-bottom: 24px; }
.setup h3 { font-family: 'Oswald', sans-serif; font-size: 1rem; font-weight: 600; color: #7a5a00; margin-bottom: 12px; letter-spacing: .5px; text-transform: uppercase; }
.setup p, .setup li { font-size: .84rem; color: #5a4200; line-height: 1.7; }
.setup ol { padding-left: 18px; margin-top: 10px; }
.setup li { margin-bottom: 5px; }
.setup code { background: #fff3c0; border: 1px solid #e8d080; border-radius: 3px; padding: 1px 5px; font-size: .8rem; color: #5a3a00; }

/* Table column headers — not sticky, just sit naturally at top of table */
.stbl thead th {
  position: static;
}
/* Sticky first column (Player name) */
.stbl th:first-child,
.stbl td:first-child {
  position: sticky;
  left: 0;
  z-index: 5;
}
.stbl th:first-child { z-index: 12; background: #f0f3f7; }
.stbl td:first-child { background: var(--card-bg); }
.stbl tbody tr:nth-child(even) td:first-child { background: var(--row-alt); }
.stbl tbody tr:hover td:first-child { background: #edf2f8; }

/* Patch table sticky first column */
.patch-tbl th:first-child,
.patch-tbl td:first-child {
  position: sticky;
  left: 0;
  z-index: 5;
  background: #f0f3f7;
}
.patch-tbl td:first-child { background: var(--card-bg); }

@media (max-width: 680px) {
  html, body { overflow-x: hidden; }
  .site-header { padding: 0 14px; height: 56px; }
  .brand-main { font-size: 1rem; }
  .tab-bar { padding: 0 10px; top: 56px; }
  .tab { padding: 10px 12px; font-size: .8rem; }
  .content { padding: 16px 12px 40px; }
  .adv-grid { grid-template-columns: 1fr; }
  .tiles { grid-template-columns: repeat(2, 1fr); }
  .footnote { font-size: .72rem; }
  .expand-label { display: none; }
}
</style>
</head>

<script>
// ══════════════════════════════════════════
// CONFIG — no publishing needed, just
// "Anyone with link can view" on both sheets
// ══════════════════════════════════════════
const PLAYERS_SHEET_ID = '1LntMa3sOtRDPhK7IYIGnXfi_TpV2lbLLu2iK5G9hQMg';
const MATCHES_SHEET_ID = '1W1nYaswO8LMzo7xpsQ5mLQY3Ir_Mc19Rcd6Itdx5SAM';

const PLAYERS = ["Brandon","Daniel","Kevin","Charlie","Quinn","Jacqueline","Aidan","Courtney"];

const PATCHES = [
  { key:'8ball_break_and_run',  label:'8-Ball Break & Run',  type:'8ball'   },
  { key:'8_on_the_break',       label:'8 on the Break',       type:'8ball'   },
  { key:'8ball_rackless',       label:'8-Ball Rackless',      type:'8ball'   },
  { key:'9ball_20-0',           label:'9-Ball 20-0',          type:'9ball'   },
  { key:'9ball_break_and_run',  label:'9-Ball Break & Run',   type:'9ball'   },
  { key:'9_on_the_snap',        label:'9 on the Snap',        type:'9ball'   },
  { key:'team_sweep_8ball',     label:'Team Sweep (8-Ball)',   type:'team'    },
  { key:'team_sweep_9ball',     label:'Team Sweep (9-Ball)',   type:'team'    },
  { key:'beat_a_6_8ball',       label:'Beat a 6 (8-Ball)',    type:'8ball'   },
  { key:'beat_a_7_8ball',       label:'Beat a 7 (8-Ball)',    type:'8ball'   },
  { key:'beat_a_8_9ball',       label:'Beat a 8 (9-Ball)',    type:'9ball'   },
  { key:'beat_a_9_9ball',       label:'Beat a 9 (9-Ball)',    type:'9ball'   },
  { key:'cycle',                label:'Cycle',                 type:'special' },
  { key:'first_win',            label:'1st Win',               type:'special' },
  { key:'mvp_8ball',            label:'MVP (8-Ball)',          type:'8ball'   },
  { key:'mvp_9ball',            label:'MVP (9-Ball)',          type:'9ball'   },
];

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let playerRows = [], matchRows = [], lastUpdated = null, loading = false;
let patchDates = {};
let activeTab  = '8ball';
let advTabs    = { adv8ball: true, adv9ball: false };
let expandedAdv = new Set(); // keys: `${gt}_${player}`
const sorts    = { '8ball': {col:null,dir:-1}, '9ball': {col:null,dir:-1}, 'mp': {col:null,dir:-1} };

function isYes(v) { return (v||'').toLowerCase().trim() === 'yes'; }

function fmtCell(cell) {
  if (!cell || cell.v == null) return '';
  // Native JS Date object
  if (cell.v instanceof Date) {
    const d = cell.v;
    return `${d.getMonth()+1}/${d.getDate()}/${d.getFullYear()}`;
  }
  const s = String(cell.v);
  // gviz returns dates as the string "Date(2026,5,8)" — month is 0-indexed
  const dm = s.match(/^Date\((\d+),(\d+),(\d+)\)/);
  if (dm) {
    return `${parseInt(dm[2])+1}/${parseInt(dm[3])}/${parseInt(dm[1])}`;
  }
  return s.trim();
}
function fmtPatchDate(str) {
  if (!str) return '';
  // Handle Date(Y,M,D) strings that may not have been converted yet
  const dm = str.match(/^Date\((\d+),(\d+),(\d+)\)/);
  if (dm) {
    const mm = String(parseInt(dm[2])+1).padStart(2,'0');
    const dd = String(parseInt(dm[3])).padStart(2,'0');
    const yy = String(parseInt(dm[1])).slice(-2);
    return `${mm}/${dd}/${yy}`;
  }
  // Handle M/D/YYYY strings
  const parts = str.split('/');
  if (parts.length !== 3) return str;
  const mm = parts[0].padStart(2, '0');
  const dd = parts[1].padStart(2, '0');
  const yy = String(parts[2]).slice(-2);
  return `${mm}/${dd}/${yy}`;
}

// ══════════════════════════════════════════
// JSONP — works from file://, no CORS issues
// Uses Google Visualization API with two
// separate sheet IDs
// ══════════════════════════════════════════
function fetchGviz(sheetId) {
  return new Promise((resolve, reject) => {
    const fn = '_gviz_' + Math.random().toString(36).slice(2);

    const timer = setTimeout(() => {
      delete window[fn];
      reject(new Error(`Timed out loading sheet ${sheetId.slice(0,8)}…`));
    }, 15000);

    window[fn] = function(resp) {
      clearTimeout(timer);
      delete window[fn];
      try { script.remove(); } catch(_) {}

      if (!resp || resp.status === 'error') {
        const msg = resp?.errors?.[0]?.detailed_message || 'Sheet unavailable';
        reject(new Error(msg));
        return;
      }
      const t = resp.table;
      if (!t || !t.cols) { resolve([]); return; }

      // Build normalised header names from column labels
      const hdrs = t.cols.map(c =>
        (c.label || c.id || '').toLowerCase().trim()
          .replace(/\s+/g, '_')
          .replace(/[()]/g, '')
      );

      const rows = (t.rows || []).map(row => {
        const obj = {};
        hdrs.forEach((h, i) => {
          obj[h] = fmtCell((row.c || [])[i]);
        });
        return obj;
      }).filter(r => Object.values(r).some(v => v !== ''));

      resolve(rows);
    };

    const script = document.createElement('script');
    script.src = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json;responseHandler:${fn}`;
    script.onerror = () => {
      clearTimeout(timer);
      delete window[fn];
      reject(new Error(`Network error loading sheet`));
    };
    document.head.appendChild(script);
  });
}

// ══════════════════════════════════════════
// FETCH
// ══════════════════════════════════════════
async function fetchData() {
  if (loading) return;
  loading = true; setStatus('loading');
  try {
    const [pRows, mRows] = await Promise.all([
      fetchGviz(PLAYERS_SHEET_ID),
      fetchGviz(MATCHES_SHEET_ID)
    ]);

    playerRows = pRows;
    matchRows  = mRows.map(r => ({
      game_type:       (r.game_type || '').toLowerCase(),
      player:          r.player || '',
      week:            parseInt(r.week) || 0,
      date:            r.date || '',
      opp_sl:          parseInt(r.opp_sl) || 0,
      player_earned:   parseFloat(r.player_earned) || 0,
      opponent_earned: parseFloat(r.opponent_earned) || 0,
      team_earned:     parseFloat(r.team_earned) || 0,
      oppteam_earned:  parseFloat(r.oppteam_earned) || 0,
      patches: Object.fromEntries(PATCHES.map(p => [p.key, isYes(r[p.key])]))
    }));

    // Build patch dates lookup
    patchDates = {};
    PLAYERS.forEach(p => {
      patchDates[p] = {};
      PATCHES.forEach(pt => { patchDates[p][pt.key] = []; });
    });
    matchRows.forEach(m => {
      const player = PLAYERS.find(p => p.toLowerCase() === m.player.toLowerCase());
      if (!player) return;
      PATCHES.forEach(pt => {
        if (m.patches[pt.key] && m.date) patchDates[player][pt.key].push(fmtPatchDate(m.date));
      });
    });

    lastUpdated = new Date();
    setStatus('ok');
  } catch(e) {
    console.error('[APA]', e);
    setStatus('err', e.message);
  } finally {
    loading = false;
    render();
  }
}

// ══════════════════════════════════════════
// STATS
// ══════════════════════════════════════════
function getMatches(player, gt) {
  return matchRows.filter(m =>
    m.game_type === gt &&
    m.player.toLowerCase() === player.toLowerCase()
  );
}
function calcStats(ms) {
  if (!ms.length) return null;
  const wins       = ms.filter(m => m.team_earned > m.oppteam_earned).length;
  const totTeam    = ms.reduce((s,m) => s + m.team_earned, 0);   // PPM uses team_earned
  const totEarned  = ms.reduce((s,m) => s + m.player_earned, 0); // racks won / balls potted
  const ppm        = totTeam / ms.length;
  const winPct     = wins / ms.length * 100;
  return {
    wins, losses: ms.length - wins, played: ms.length,
    winPct: winPct.toFixed(1), winPctNum: winPct,
    ppm: ppm.toFixed(2), ppmNum: ppm,
    totalEarned: totEarned
  };
}
function groupByOppSL(ms) {
  const g={};
  ms.forEach(m => { if(!g[m.opp_sl]) g[m.opp_sl]=[]; g[m.opp_sl].push(m); });
  return Object.entries(g).sort(([a],[b])=>+a-+b).map(([sl,arr])=>({sl:+sl,...calcStats(arr)}));
}
function calcTeamRecord(gameType) {
  const gm    = matchRows.filter(m => m.game_type === gameType);
  const weeks = [...new Set(gm.map(m => m.week))];
  let W = 0, D = 0, L = 0;
  weeks.forEach(week => {
    const wm       = gm.filter(m => m.week === week);
    const teamTot  = wm.reduce((s,m) => s + m.team_earned,    0);
    const oppTot   = wm.reduce((s,m) => s + m.oppteam_earned, 0);
    if      (teamTot > oppTot) W++;
    else if (teamTot < oppTot) L++;
    else                       D++;
  });
  return { W, D, L };
}
function toggleAdv(key) {
  // Capture scroll positions before re-render so the view doesn't jump
  const wrap      = document.querySelector('.tbl-wrap');
  const scrollX   = wrap ? wrap.scrollLeft : 0;
  const scrollY   = window.scrollY || window.pageYOffset || 0;

  expandedAdv.has(key) ? expandedAdv.delete(key) : expandedAdv.add(key);
  render();

  // Restore both positions after the DOM update
  requestAnimationFrame(() => {
    window.scrollTo({ top: scrollY, behavior: 'instant' });
    const newWrap = document.querySelector('.tbl-wrap');
    if (newWrap) newWrap.scrollLeft = scrollX;
  });
}
function getPlayerSL(name, gt) {
  const r = playerRows.find(r=>(r.name||'').toLowerCase()===name.toLowerCase());
  if (!r) return null;
  const v = r[`sl_${gt}`];
  return v&&v!=='' ? parseInt(v) : null;
}
function winColor(pct) {
  const n=parseFloat(pct);
  if (n>=70) return { fill:'#1a7a3c', text:'#1a7a3c' };
  if (n>=50) return { fill:'#c8960a', text:'#7a5800' };
  return      { fill:'#c0152a', text:'#8a0c1e' };
}

// ══════════════════════════════════════════
// SORT
// ══════════════════════════════════════════
function sortPlayers(players, statsMap, col, dir) {
  return [...players].sort((a,b) => {
    const sa=statsMap[a], sb=statsMap[b];
    let va, vb;
    if (col==='sl8')    { va=getPlayerSL(a,'8ball')||0; vb=getPlayerSL(b,'8ball')||0; }
    else if(col==='sl9'){ va=getPlayerSL(a,'9ball')||0; vb=getPlayerSL(b,'9ball')||0; }
    else if(col==='w')  { va=sa?sa.wins:0; vb=sb?sb.wins:0; }
    else if(col==='l')  { va=sa?sa.losses:0; vb=sb?sb.losses:0; }
    else if(col==='wp') { va=sa?sa.winPctNum:0; vb=sb?sb.winPctNum:0; }
    else if(col==='pm') { va=sa?sa.ppmNum:0; vb=sb?sb.ppmNum:0; }
    else if(col==='rw') { va=sa?sa.totalEarned:0; vb=sb?sb.totalEarned:0; }
    else if(col==='nm') { va=a; vb=b; return dir*(va<vb?-1:va>vb?1:0); }
    else return 0;
    return dir*(vb-va);
  });
}
function sortClick(gt, col) {
  const s = sorts[gt];
  s.dir = (s.col===col) ? s.dir*-1 : -1;
  s.col = col;
  render();
}
function thCls(gt, col) {
  const s=sorts[gt];
  if (s.col!==col) return '';
  return s.dir===-1 ? 'sort-desc' : 'sort-asc';
}

// NAVIGATION
// ══════════════════════════════════════════
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(el => el.classList.toggle('active', el.dataset.tab===tab));
  render();
}
function switchAdvTab(gt) {
  advTabs = { adv8ball: gt==='8ball', adv9ball: gt==='9ball' };
  render();
}
function setStatus(state, msg) {
  const d = document.getElementById('sdot');
  const t = document.getElementById('stext');
  if (state === 'ok') {
    d.className   = 'sdot ok';
    t.textContent = 'Live · ' + (lastUpdated?.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) || '');
    t.title       = '';
  } else if (state === 'err') {
    d.className   = 'sdot err';
    t.textContent = msg ? '❌ ' + msg : '❌ Error — check console';
    t.title       = msg || '';
    t.style.maxWidth = '480px';
    t.style.whiteSpace = 'normal';
    t.style.fontSize = '.7rem';
  } else {
    d.className   = 'sdot';
    t.textContent = 'Loading…';
    t.title       = '';
  }
}

  html += `</tbody></table></div>
  <div class="footnote">PPM = Team Points Per Match (player's team points earned ÷ matches played)</div>

  return html;
}

// ══════════════════════════════════════════
// RENDER — PATCH TRACKER
// ══════════════════════════════════════════
function renderPatches() {
  const counts = {};
  PLAYERS.forEach(p => {
    counts[p] = { total:0, byPatch:{} };
    PATCHES.forEach(pt => { counts[p].byPatch[pt.key] = 0; });
  });
  matchRows.forEach(m => {
    const player = PLAYERS.find(p => p.toLowerCase() === m.player.toLowerCase());
    if (!player) return;
    PATCHES.forEach(pt => {
      if (m.patches[pt.key]) { counts[player].byPatch[pt.key]++; counts[player].total++; }
    });
  });

  const typeGroups = [
    { label:'8-Ball Patches',  types:['8ball'],   cls:'patch-type-8'  },
    { label:'9-Ball Patches',  types:['9ball'],   cls:'patch-type-9'  },
    { label:'Team Patches',    types:['team'],    cls:'patch-type-tm' },
    { label:'Special Patches', types:['special'], cls:'patch-type-sp' },
  ];

  let html = `<div class="card">
    <div class="card-head">
      <span class="card-title">Patch Tracker</span>
      <span class="card-sub">Click/Hover For Dates</span>
    </div>
    <div class="tbl-wrap"><table class="patch-tbl">
      <thead><tr>
        <th>Patch</th>
        ${PLAYERS.map(p=>`<th>${p}</th>`).join('')}
      </tr></thead>
      <tbody>`;

  typeGroups.forEach(grp => {
    const grpPatches = PATCHES.filter(pt => grp.types.includes(pt.type));
    if (!grpPatches.length) return;
    html += `<tr><td class="patch-section-title ${grp.cls}" style="padding:8px 14px;position:sticky;left:0;z-index:6">${grp.label}</td>${PLAYERS.map(()=>`<td style="background-color:#f7f9fb;border-bottom:1px solid var(--border-lt);border-right:1px solid var(--border-lt)"></td>`).join('')}</tr>`;
    grpPatches.forEach(pt => {
      html += `<tr>
        <td style="font-weight:600;color:var(--text-mid);white-space:nowrap" class="${grp.cls}">${pt.label}</td>
        ${PLAYERS.map(p => {
          const cnt   = counts[p].byPatch[pt.key];
          const dates = (patchDates[p]?.[pt.key] || []);
          const tip   = dates.length ? dates.join('\\n') : 'No date recorded';
          return cnt > 0
            ? `<td><span class="check-cnt" onmouseenter="showTip(this,'${tip}')" onmouseleave="hideTip()" onclick="showTip(this,'${tip}')">${cnt}</span></td>`
            : `<td></td>`;
        }).join('')}
      </tr>`;
    });
  });

  // Total row
  html += `<tr style="background:#f0f3f7">
    <td style="font-family:'Oswald',sans-serif;font-weight:700;letter-spacing:.5px;text-transform:uppercase;font-size:.78rem;color:var(--navy)">TOTAL</td>
    ${PLAYERS.map(p=>`<td><span class="total-badge">${counts[p].total}</span></td>`).join('')}
  </tr>`;

  html += `</tbody></table></div></div>`;
  return html;
}

function renderMatchesPlayed() {

  const data = PLAYERS.map(p => ({
    name: p,
    eightBall: getMatches(p, '8ball').length,
    nineBall:  getMatches(p, '9ball').length,
    total:     getMatches(p, '8ball').length + getMatches(p, '9ball').length
  }));
  const sorted = [...data].sort((a, b) => {
    if (s.col === 'nm')  return s.dir * (a.name < b.name ? -1 : a.name > b.name ? 1 : 0);
    if (s.col === '8b')  return s.dir * (b.eightBall - a.eightBall);
    if (s.col === '9b')  return s.dir * (b.nineBall  - a.nineBall);
    if (s.col === 'tot') return s.dir * (b.total      - a.total);
    return 0;
  });
  let html = `<div class="card">
    <div class="card-head">
      <span class="card-title">Matches Played</span>
      <span class="card-sub">Individual match counts by game type</span>
    </div>
    <div class="tbl-wrap"><table class="stbl">
      <thead><tr>
        <th onclick="sortClickMp('nm')"  class="${mpThCls('nm')}">Player</th>
        <th onclick="sortClickMp('8b')"  class="${mpThCls('8b')}"  style="text-align:center">8-Ball</th>
        <th onclick="sortClickMp('9b')"  class="${mpThCls('9b')}"  style="text-align:center">9-Ball</th>
        <th onclick="sortClickMp('tot')" class="${mpThCls('tot')}" style="text-align:center">Total</th>
      </tr></thead>
      <tbody>`;
  sorted.forEach(row => {
    html += `<tr>
      <td class="pname" style="font-size:1.05rem">${row.name}</td>
      <td style="text-align:center" class="stat-val">${row.eightBall || '—'}</td>
      <td style="text-align:center" class="stat-val">${row.nineBall  || '—'}</td>
      <td style="text-align:center;font-family:'Oswald',sans-serif;font-size:1rem;font-weight:700;color:var(--navy)">${row.total || '—'}</td>
    </tr>`;
  });
  html += `</tbody></table></div></div>`;
  return html;
}

// RENDER — TEAM (area charts via Chart.js)
// ══════════════════════════════════════════
function buildChartData(gameType) {
  const gm = matchRows.filter(m => m.game_type === gameType);
  // Always start from Week 1; extend to the highest recorded week
  const maxWeek = gm.length ? Math.max(...gm.map(m => m.week)) : 1;
  const allWeeks = Array.from({ length: maxWeek }, (_, i) => i + 1);

  const datasets = PLAYERS.map((player, i) => {
    const pm = gm.filter(m => m.player.toLowerCase() === player.toLowerCase());
    const weekMap = {};
    pm.forEach(m => { weekMap[m.week] = m.team_earned; });

    let cumTotal = 0;
    const data = allWeeks.map(w => {
      if (weekMap[w] !== undefined) cumTotal += weekMap[w];
      return cumTotal; // 0 before first match, growing after
    });

    return {
      label: player,
      data,
      borderColor: PLAYER_COLORS[i].border,
      backgroundColor: PLAYER_COLORS[i].bg,
      fill: true,
      tension: 0.35,
      spanGaps: false,
      pointRadius: 5,
      pointHoverRadius: 7,
      borderWidth: 2,
    };
  }); // All players included — those who haven't played show as a flat 0 line

  return { labels: allWeeks.map(w => `Week ${w}`), datasets };
}

  <div class="card">

        : `<div class="no-data">No 9-ball match data yet</div>`}
    </div>
  </div>
  ${renderMatchesPlayed()}`;

  const chartDefaults = {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: {
        position: 'bottom',
        labels: {
          font: { family: "'Oswald', sans-serif", size: 13 },
          padding: 18,
          usePointStyle: true,
          pointStyle: 'circle',
          boxWidth: 10,
          boxHeight: 10,
        }

      tooltip: {
        backgroundColor: '#0c2340',
        titleFont: { family: "'Oswald', sans-serif", size: 13 },
        bodyFont: { family: "'Open Sans', sans-serif", size: 12 },
        padding: 12,
        callbacks: {
          label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y ?? '—'} pts`

      }
    },
    scales: {
      x: {
        grid: { color: '#e8eaed' },
        ticks: { font: { family: "'Oswald', sans-serif", size: 12 }, color: '#6b7480' }
      },
      y: {
        stacked: true,
        beginAtZero: true,
        grid: { color: '#e8eaed' },
        ticks: {
          font: { family: "'Oswald', sans-serif", size: 12 },
          color: '#6b7480',
        },
        title: {
          display: true,
          text: 'Cumulative Team Points (Stacked)',
          font: { family: "'Oswald', sans-serif", size: 12 },
          color: '#6b7480'
        }
      }
    }
  };

  if (has8) {
    const d8 = buildChartData('8ball');
    teamCharts['8ball'] = new Chart(document.getElementById('chart8'), {
      type: 'line',
      data: d8,
      options: { ...chartDefaults }
    });
  }
  if (has9) {
    const d9 = buildChartData('9ball');
    teamCharts['9ball'] = new Chart(document.getElementById('chart9'), {
      type: 'line',
      data: d9,
      options: { ...chartDefaults }
    });
  }
}

function showTip(el, datesStr) {
  const tip   = document.getElementById('patchTip');
  const dates = document.getElementById('tipDates');
  dates.textContent = datesStr.replace(/\\n/g, '\n') || 'No date recorded';
  tip.style.display = 'block';
  const rect = el.getBoundingClientRect();
  let top  = rect.bottom + 8;
  let left = rect.left;
  // Keep inside viewport
  if (left + 160 > window.innerWidth) left = window.innerWidth - 168;
  if (top  + 80  > window.innerHeight) top = rect.top - tip.offsetHeight - 8;
  tip.style.top  = top  + 'px';
  tip.style.left = left + 'px';
}
function hideTip() {
  document.getElementById('patchTip').style.display = 'none';
}
document.addEventListener('click', e => {
  if (!e.target.classList.contains('check-cnt')) hideTip();
});

(function loadLogo() {
  const tmpImg = new Image();
  tmpImg.onload = function() {
    const canvas = document.createElement('canvas');
    canvas.width  = tmpImg.naturalWidth;
    canvas.height = tmpImg.naturalHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(tmpImg, 0, 0);
    const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const px = imgData.data;
    for (let i = 0; i < px.length; i += 4) {
      const r = px[i], g = px[i+1], b = px[i+2];
      // Remove white and near-white pixels
      if (r > 230 && g > 230 && b > 230) {
        px[i+3] = 0;
      } else if (r > 210 && g > 210 && b > 210) {
        // Soft edge: partial transparency
        const whiteness = Math.min(r, g, b);
        px[i+3] = Math.round((255 - whiteness) * (255 / 45));
      }
    }
    ctx.putImageData(imgData, 0, 0);
    const logoEl = document.getElementById('logoImg');
    if (logoEl) logoEl.src = canvas.toDataURL('image/png');
  };
  tmpImg.src = LOGO_SRC;
})();
